name: One-time Codex site cleanup

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/codex-site-cleanup.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply site cleanup
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const root = process.cwd();
          const oldShop = path.join(root, 'Our Shop.html');
          const newShop = path.join(root, 'our-shop.html');
          if (fs.existsSync(oldShop)) {
            fs.renameSync(oldShop, newShop);
          }

          const phoneSvg = '<div class="contact-icon"><svg aria-hidden="true" viewBox="0 0 24 24" focusable="false"><path d="M6.6 10.8c1.4 2.8 3.8 5.2 6.6 6.6l2.2-2.2c.3-.3.8-.4 1.2-.3 1.3.4 2.6.6 4 .6.7 0 1.2.5 1.2 1.2v3.5c0 .7-.5 1.2-1.2 1.2C10.8 21.9 2.1 13.2 2.1 3.4c0-.7.5-1.2 1.2-1.2h3.5c.7 0 1.2.5 1.2 1.2 0 1.4.2 2.7.6 4 .1.4 0 .9-.3 1.2l-1.7 2.2z"/></svg></div>';
          const emailSvg = '<div class="contact-icon"><svg aria-hidden="true" viewBox="0 0 24 24" focusable="false"><path d="M3.8 5h16.4c1 0 1.8.8 1.8 1.8v10.4c0 1-.8 1.8-1.8 1.8H3.8c-1 0-1.8-.8-1.8-1.8V6.8C2 5.8 2.8 5 3.8 5zm.6 2 7.6 5.1L19.6 7H4.4zm15.6 9.6V8.9l-7.3 4.9c-.4.3-.9.3-1.4 0L4 8.9v7.7h16z"/></svg></div>';
          const pinSvg = '<div class="contact-icon"><svg aria-hidden="true" viewBox="0 0 24 24" focusable="false"><path d="M12 2.2c4 0 7.2 3.2 7.2 7.2 0 5.3-7.2 12.4-7.2 12.4S4.8 14.7 4.8 9.4c0-4 3.2-7.2 7.2-7.2zm0 10.3a3.1 3.1 0 1 0 0-6.2 3.1 3.1 0 0 0 0 6.2z"/></svg></div>';

          function walk(dir) {
            return fs.readdirSync(dir, { withFileTypes: true }).flatMap((entry) => {
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) {
                if (entry.name === '.git' || entry.name === 'node_modules') return [];
                return walk(full);
              }
              return [full];
            });
          }

          const meta = {
            'index.html': {
              desc: 'NeutrapH delivers clean, purified drinking water in Bushbuckridge and surrounding communities. Reverse osmosis purification, dispenser rentals, subscriptions and packaged water.',
              title: 'NeutrapH – Purified Water Delivery in Bushbuckridge | Balanced Water. Better Life.'
            },
            'water-purification.html': {
              desc: 'Learn how NeutrapH uses reverse osmosis to purify high-salinity borehole water into safe, clean drinking water for homes, schools and businesses in Bushbuckridge.',
              title: 'Reverse Osmosis Water Purification | NeutrapH Bushbuckridge'
            },
            'water-dispensers.html': {
              desc: 'Rent a water dispenser from NeutrapH in Bushbuckridge. Durable dispensers with maintenance support for schools, churches, offices and communities.',
              title: 'Water Dispenser Rental in Bushbuckridge | NeutrapH'
            },
            'subscriptions.html': {
              desc: 'Choose an affordable monthly water subscription from NeutrapH. Plans from R299/month including dispenser rental, 18.9L bottles and delivery in Bushbuckridge.',
              title: 'Monthly Water Subscription Plans from R299 | NeutrapH'
            },
            'contact.html': {
              desc: 'Contact NeutrapH to start a water subscription, order packaged water or request a dispenser in Bushbuckridge, Mpumalanga. WhatsApp or email us today.',
              title: 'Contact NeutrapH | Order Water in Bushbuckridge'
            },
            'our-shop.html': {
              desc: 'Buy purified packaged water from NeutrapH in 500ml, 1.5L, 5L and 10L options. Delivered to homes, schools and businesses in Bushbuckridge.',
              title: 'Buy Packaged Water Online | NeutrapH Shop'
            },
            'refilling-station.html': {
              desc: 'Refill clean purified water at the NeutrapH water refilling station in Bushbuckridge, with affordable refills for homes, schools and communities.',
              title: 'Water Refilling Station in Bushbuckridge | NeutrapH'
            }
          };

          for (const file of walk(root).filter((file) => file.endsWith('.html'))) {
            let text = fs.readFileSync(file, 'utf8');
            text = text
              .replaceAll('href="/Our Shop.html"', 'href="/our-shop.html"')
              .replaceAll('href="Our Shop.html"', 'href="our-shop.html"')
              .replaceAll("href='/Our Shop.html'", "href='/our-shop.html'")
              .replaceAll("href='Our Shop.html'", "href='our-shop.html'")
              .replaceAll('data-page="Our Shop.html"', 'data-page="our-shop.html"')
              .replaceAll('href="#" class="social-btn" aria-label="Facebook"', 'href="https://facebook.com/neutraph" class="social-btn" aria-label="Facebook"')
              .replaceAll('href="#" class="social-btn" aria-label="Instagram"', 'href="https://instagram.com/neutraph" class="social-btn" aria-label="Instagram"')
              .replaceAll('Serving Johannesburg and beyond.', 'Serving Bushbuckridge and surrounding communities.')
              .replaceAll('Serving Bushbuckridge and surrounding areas.', 'Serving Bushbuckridge and surrounding communities.')
              .replaceAll('Serving Welverdiend, Bushbuckridge and nearby communities.', 'Serving Bushbuckridge and surrounding communities.')
              .replaceAll('Midrand, Johannesburg<br>South Africa', 'Welverdiend, Bushbuckridge<br>Mpumalanga, South Africa')
              .replaceAll('water delivery Johannesburg', 'water delivery Bushbuckridge')
              .replaceAll('<div class="contact-icon"><img src="https://cdn-icons-png.flaticon.com/512/159/159832.png" alt=""></div>', phoneSvg)
              .replaceAll('<div class="contact-icon"><img src="https://cdn-icons-png.flaticon.com/512/732/732200.png" alt=""></div>', emailSvg)
              .replaceAll('<div class="contact-icon"><img src="https://cdn-icons-png.flaticon.com/512/149/149060.png" alt=""></div>', pinSvg);

            if (path.basename(file) === 'index.html' || path.basename(file) === 'contact.html') {
              text = text.replace(/\r?\n\s*<div class="payment-box">\s*<h4>Payment Gateway Ready<\/h4>[\s\S]*?<\/div>/, '');
            }

            const pageMeta = meta[path.basename(file)];
            if (pageMeta) {
              text = text.replace(/<meta name="description" content="[^"]*">/, `<meta name="description" content="${pageMeta.desc}">`);
              text = text.replace(/<title>[\s\S]*?<\/title>/, `<title>${pageMeta.title}</title>`);
            }

            fs.writeFileSync(file, text);
          }

          const scriptPath = path.join(root, 'assets/js/script.js');
          if (fs.existsSync(scriptPath)) {
            let script = fs.readFileSync(scriptPath, 'utf8');
            if (!script.includes('function showFormConfirmation(form)')) {
              script = script.replace(
                'function submitLead(e){',
                `function showFormConfirmation(form){\n  if(!form) return;\n\n  const buttons = form.querySelector('.form-buttons');\n  if(!buttons) return;\n\n  let confirmation = form.querySelector('.form-confirmation');\n  if(!confirmation){\n    confirmation = document.createElement('p');\n    confirmation.className = 'form-confirmation';\n    buttons.insertAdjacentElement('afterend', confirmation);\n  }\n\n  confirmation.textContent = '✅ Your details are ready to send. Complete the action in WhatsApp or your email app.';\n}\n\nfunction submitLead(e){`
              );
            }
            if (!script.includes('showFormConfirmation(e.target);')) {
              script = script.replace(
                '  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, \'_blank\');',
                '  showFormConfirmation(e.target);\n  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, \'_blank\');'
              );
            }
            if (!script.includes('showFormConfirmation(form);')) {
              script = script.replace(
                "  window.location.href =\n    'mailto:info@neutraph.co.za' +",
                "  showFormConfirmation(form);\n  window.location.href =\n    'mailto:info@neutraph.co.za' +"
              );
            }
            fs.writeFileSync(scriptPath, script);
          }

          const contactPath = path.join(root, 'contact.html');
          if (fs.existsSync(contactPath)) {
            let contact = fs.readFileSync(contactPath, 'utf8');
            if (contact.includes('function submitLeadEmail()') && !contact.includes('showFormConfirmation(form);')) {
              contact = contact.replace(
                '  window.location.href="mailto:"+email+"?subject="+encodeURIComponent(subject)+"&body="+encodeURIComponent(msg);',
                '  showFormConfirmation(form);\n  window.location.href="mailto:"+email+"?subject="+encodeURIComponent(subject)+"&body="+encodeURIComponent(msg);'
              );
              fs.writeFileSync(contactPath, contact);
            }
          }

          const cssPath = path.join(root, 'assets/css/style.css');
          if (fs.existsSync(cssPath)) {
            let css = fs.readFileSync(cssPath, 'utf8');
            if (!css.includes('.form-confirmation')) {
              css += `\n\n.contact-icon svg{\n  width:16px;\n  height:16px;\n  fill:#00b4d8;\n  display:block;\n}\n\n.form-confirmation{\n  margin-top:12px;\n  color:#0a6b4e;\n  background:#e9fbf4;\n  border:1px solid #b8ead7;\n  border-radius:8px;\n  padding:12px 14px;\n  font-size:14px;\n  font-weight:700;\n  line-height:1.45;\n}\n`;
              fs.writeFileSync(cssPath, css);
            }
          }

          fs.rmSync(path.join(root, '.github/workflows/codex-site-cleanup.yml'), { force: true });
          NODE

      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Fix site URL, location, social links and SEO"
            git push
          fi
