name: Codex Shop Rename

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  rename-shop-page:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rename shop page and update references
        run: |
          set -euo pipefail

          if [ -f "our-shop.html" ]; then
            mv "our-shop.html" "Shop.html"
          fi

          find . -type f \
            \( -name "*.html" -o -name "*.js" -o -name "*.css" -o -name "*.md" -o -name "*.toml" -o -name "*.json" -o -name "*.xml" -o -name "*.txt" \) \
            -not -path "./.git/*" \
            -print0 | xargs -0 perl -0pi -e 's#/our-shop\.html#/Shop.html#g; s#our-shop\.html#Shop.html#g; s#/Our Shop\.html#/Shop.html#g; s#Our Shop\.html#Shop.html#g; s#/Our shop\.html#/Shop.html#g; s#Our shop\.html#Shop.html#g;'

          rm -f ".github/workflows/codex-shop-rename.yml"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No shop filename changes needed."
            exit 0
          fi

          git add -A
          git commit -m "Rename shop page to Shop.html"
          git push
