name: Codex header and footer polish
# Touch this workflow after creation so GitHub runs it.

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/codex-header-footer-polish.yml"

permissions:
  contents: write

jobs:
  polish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply CSS polish
        run: |
          node <<'NODE'
          const fs = require('fs');
          const cssPath = 'assets/css/style.css';
          const workflowPath = '.github/workflows/codex-header-footer-polish.yml';
          const marker = 'CODEX HEADER AND FOOTER CTA POLISH';

          const polish = String.raw`
/* =========================================================
   CODEX HEADER AND FOOTER CTA POLISH
   Shared polish for the secondary logo and WhatsApp buttons.
========================================================= */

@media(min-width:1051px){
  .nav-wrap{
    min-height:118px;
    padding-left:12px;
    padding-right:12px;
  }

  .logo-area{
    min-width:320px;
  }

  .site-logo,
  .site-logo-img{
    height:112px;
    max-height:112px;
    transform:scale(1.12);
    transform-origin:left center;
  }
}

.header-cta{
  min-width:0;
  min-height:58px;
  padding:14px 28px;
  gap:11px;
  border-radius:999px;
  background:linear-gradient(135deg,#0795d2 0%,#006da8 100%);
  border:1px solid rgba(255,255,255,.45);
  color:#fff;
  box-shadow:0 16px 34px rgba(0,119,182,.24);
  line-height:1;
  white-space:nowrap;
  text-align:center;
}

.header-cta:hover{
  background:linear-gradient(135deg,#007fbb 0%,#064b7a 100%);
  box-shadow:0 20px 42px rgba(0,77,126,.28);
  transform:translateY(-2px);
}

.header-cta .wa-icon-sm,
.header-cta img.wa-icon-sm{
  width:24px;
  height:24px;
  flex:0 0 24px;
  padding:3px;
  border-radius:50%;
  background:#fff;
  box-shadow:0 3px 8px rgba(0,45,70,.18);
}

.footer-logo-img{
  width:180px;
  max-width:180px;
  height:auto;
  margin-bottom:16px;
  filter:drop-shadow(0 10px 18px rgba(0,0,0,.18));
}

.social-row{
  align-items:center;
  gap:12px;
}

.social-btn{
  background:rgba(255,255,255,.08);
  border-color:rgba(255,255,255,.22);
  transition:transform .2s ease, background .2s ease, border-color .2s ease, box-shadow .2s ease;
}

.social-btn:hover{
  background:rgba(255,255,255,.14);
  border-color:rgba(255,255,255,.36);
  transform:translateY(-2px);
}

.social-btn[href*="wa.me"]{
  width:48px;
  height:48px;
  border-radius:50%;
  background:#25d366;
  border-color:transparent;
  box-shadow:0 12px 26px rgba(37,211,102,.25);
}

.social-btn[href*="wa.me"]:hover{
  background:#1ebe5d;
  box-shadow:0 16px 34px rgba(37,211,102,.34);
}

.social-btn[href*="wa.me"] img{
  width:24px;
  height:24px;
}

.sticky-mobile-cta{
  border-radius:999px;
  background:linear-gradient(135deg,#25d366 0%,#128c7e 100%);
  box-shadow:0 14px 34px rgba(0,0,0,.24);
}

@media(max-width:1120px){
  .nav-wrap{
    min-height:102px;
  }

  .logo-area{
    min-width:260px;
  }

  .site-logo,
  .site-logo-img{
    height:90px;
    max-height:90px;
    transform:none;
  }

  .header-cta{
    min-height:52px;
    padding:12px 20px;
    font-size:14px;
  }
}

@media(max-width:1050px){
  .nav-wrap{
    min-height:78px;
  }

  .logo-area{
    min-width:auto;
  }

  .site-logo,
  .site-logo-img{
    height:72px;
    max-height:72px;
  }
}

@media(max-width:760px){
  .site-logo,
  .site-logo-img{
    height:68px;
    max-height:68px;
  }

  .footer-logo-img{
    width:160px;
    max-width:160px;
  }
}`;

          let css = fs.readFileSync(cssPath, 'utf8');
          if (!css.includes(marker)) {
            css = css.replace(/\s*$/, '') + '\n\n' + polish + '\n';
            fs.writeFileSync(cssPath, css);
          }

          fs.rmSync(workflowPath, { force: true });
          NODE

      - name: Commit CSS polish
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/css/style.css .github/workflows/codex-header-footer-polish.yml
          git commit -m "Polish header logo and WhatsApp buttons"
          git push
