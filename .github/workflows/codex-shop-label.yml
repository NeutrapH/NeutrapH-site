name: Codex Shop Label Update

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-shop-label:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update visible shop labels
        run: |
          set -euo pipefail

          find . -type f \
            \( -name "*.html" -o -name "*.js" -o -name "*.css" -o -name "*.md" -o -name "*.toml" -o -name "*.json" -o -name "*.xml" -o -name "*.txt" \) \
            -not -path "./.git/*" \
            -print0 | xargs -0 perl -0pi -e 's#Our Shop#Shop#g;'

          rm -f ".github/workflows/codex-shop-label.yml"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No shop label changes needed."
            exit 0
          fi

          git add -A
          git commit -m "Update shop navigation label"
          git push
