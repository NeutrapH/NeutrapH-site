name: Remove footer bottom row

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  cleanup:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Remove footer-bottom markup
        run: |
          node <<'NODE'
          const fs = require('fs');

          const files = fs.readdirSync('.')
            .filter((file) => file.endsWith('.html'));

          const footerBottomPattern = /\s*<div class="footer-bottom">\s*<span>[\s\S]*?<\/span>\s*<span>[\s\S]*?<\/span>\s*<\/div>\s*/g;

          for (const file of files) {
            const html = fs.readFileSync(file, 'utf8');
            const updated = html.replace(footerBottomPattern, '\n');

            if (updated !== html) {
              fs.writeFileSync(file, updated);
              console.log(`Removed footer-bottom from ${file}`);
            }
          }

          const workflowPath = '.github/workflows/remove-footer-bottom.yml';
          if (fs.existsSync(workflowPath)) {
            fs.rmSync(workflowPath);
            console.log('Removed temporary cleanup workflow');
          }
          NODE

      - name: Commit cleanup
        run: |
          if git diff --quiet; then
            echo "No footer-bottom markup found."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove footer bottom markup"
          git push
