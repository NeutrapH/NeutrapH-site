name: Codex Reorganize Site

"on":
  push:
    branches:
      - main
    paths:
      - ".github/workflows/codex-reorganize-site.yml"

permissions:
  contents: write

jobs:
  reorganize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Reorganize static site files
        run: node .github/scripts/reorganize-site.js

      - name: Commit reorganized structure
        run: |
          git config user.name "Codex"
          git config user.email "codex@openai.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "Organize site assets and structure"
            git push origin main
          else
            echo "No changes to commit."
          fi
