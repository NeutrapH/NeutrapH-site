name: One-time Codex script fix

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/codex-script-fix.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix form confirmation placement
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const root = process.cwd();
          const scriptPath = path.join(root, 'assets/js/script.js');
          let script = fs.readFileSync(scriptPath, 'utf8');

          script = script.replace(
            "  const msg = `Hi NeutrapH, I would like to order ${qty} x ${product}. Please confirm delivery and payment details.`;\n  showFormConfirmation(e.target);\n  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');",
            "  const msg = `Hi NeutrapH, I would like to order ${qty} x ${product}. Please confirm delivery and payment details.`;\n  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');"
          );

          if (!script.includes('showFormConfirmation(e.target);')) {
            script = script.replace(
              "  for(const [k, v] of f.entries()){\n    if(v) msg += `${k}: ${v}\\n`;\n  }\n\n  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');",
              "  for(const [k, v] of f.entries()){\n    if(v) msg += `${k}: ${v}\\n`;\n  }\n\n  showFormConfirmation(e.target);\n  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');"
            );
          }

          fs.writeFileSync(scriptPath, script);
          fs.rmSync(path.join(root, '.github/workflows/codex-script-fix.yml'), { force: true });
          NODE

      - name: Commit script fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Fix form confirmation script placement"
            git push
          fi
