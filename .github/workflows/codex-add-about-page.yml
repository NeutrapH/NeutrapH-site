name: Codex Add About Page

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  add-about-page:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Add About Us page and navigation
        run: |
          set -euo pipefail

          cat > about.html <<'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <meta name="description" content="Learn about NeutrapH, a community-driven water purification company based in Welverdiend, Bushbuckridge, Mpumalanga. Our mission is clean, safe drinking water for every household, school and business.">
            <meta name="keywords" content="about NeutrapH, water purification Bushbuckridge, clean water Mpumalanga, NeutrapH story, who we are">
            <meta property="og:title" content="About Us | NeutrapH">
            <meta property="og:description" content="Community-driven water purification in Bushbuckridge. Learn who we are, what drives us and how we serve local communities.">
            <meta property="og:type" content="website">
            <title>About Us | NeutrapH - Balanced Water. Better Life.</title>
            <link rel="icon" href="favicon.ico">
            <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Open+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
            <link rel="stylesheet" href="assets/css/style.css">
          </head>
          <body class="page-about">
          <header>
            <div class="container nav-wrap">
              <a href="index.html" class="logo-area">
                <img src="assets/images/neutraph-secondary-logo.png" alt="NeutrapH Logo" class="site-logo">
              </a>
              <button class="menu-toggle" onclick="toggleMenu()" aria-label="Open menu">&#9776;</button>
              <nav>
                <a href="index.html" data-page="index.html">Home</a>
                <a href="water-purification.html" data-page="water-purification.html">Purification</a>
                <a href="water-dispensers.html" data-page="water-dispensers.html">Dispensers</a>
                <a href="subscriptions.html" data-page="subscriptions.html">Subscriptions</a>
                <a href="refilling-station.html" data-page="refilling-station.html">Refilling Station</a>
                <a href="Shop.html" data-page="Shop.html">Shop</a>
                <a href="about.html" data-page="about.html">About Us</a>
                <a href="contact.html" data-page="contact.html">Contact</a>
              </nav>
              <a href="https://wa.me/27798134597" target="_blank" class="header-cta">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="wa-icon-sm" alt="">Order Now
              </a>
            </div>
          </header>

          <main>
            <section class="about-hero">
              <div class="container">
                <span class="hero-badge">Our Story</span>
                <h1>Water is a right,<br>not a privilege.</h1>
                <p>NeutrapH was built on one belief: every household, school and community in Bushbuckridge deserves access to clean, safe drinking water affordably and reliably.</p>
                <div class="hero-actions">
                  <a href="subscriptions.html" class="btn btn-white">View Our Plans</a>
                  <a href="contact.html" class="btn btn-outline">Get in Touch</a>
                </div>
              </div>
            </section>

            <section class="section alt about-story">
              <div class="container story-grid">
                <div>
                  <span class="section-label">Who We Are</span>
                  <h2 class="section-title">Born from a community need</h2>
                  <p>NeutrapH started when we saw first-hand how communities in Welverdiend and Bushbuckridge struggled with access to clean drinking water. Borehole water in the region carries high salinity and contamination levels that make it unsafe to drink without treatment.</p>
                  <p>We set out to fix that with a practical, affordable reverse osmosis solution backed by real delivery and maintenance support. Today we serve homes, schools, churches, offices and football clubs across Bushbuckridge and surrounding areas.</p>
                  <p>Our name, NeutrapH, reflects our commitment to water that is balanced: neither too acidic nor too alkaline, just clean and safe the way water should be.</p>
                </div>
                <div class="story-visual" aria-label="NeutrapH company milestones">
                  <div class="big-stat">2024</div>
                  <div class="stat-label">Founded in Welverdiend</div>
                  <div class="stat-row">
                    <div class="mini-stat"><strong>RO</strong><span>Purification</span></div>
                    <div class="mini-stat"><strong>UV</strong><span>Sterilisation</span></div>
                    <div class="mini-stat"><strong>24/7</strong><span>Support</span></div>
                  </div>
                </div>
              </div>
            </section>

            <section class="section about-values">
              <div class="container">
                <span class="section-label">What Drives Us</span>
                <h2 class="section-title">Our mission and values</h2>
                <p class="section-desc">Everything we do is guided by the belief that clean water changes lives. Our values shape how we operate, how we serve and how we grow.</p>
                <div class="section-divider"></div>
                <div class="values-grid">
                  <div class="value-card"><div class="value-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2C8.1 2 5 5.1 5 9c0 5.3 7 13 7 13s7-7.7 7-13c0-3.9-3.1-7-7-7zm0 9.5A2.5 2.5 0 1 1 12 6a2.5 2.5 0 0 1 0 5.5z"/></svg></div><h3>Community First</h3><p>We are part of the communities we serve. Every decision considers the families, learners and workers who depend on our water.</p></div>
                  <div class="value-card"><div class="value-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 16.2 4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z"/></svg></div><h3>Quality You Can Trust</h3><p>We use multi-stage reverse osmosis and UV sterilisation to ensure every litre meets a consistent, safe standard.</p></div>
                  <div class="value-card"><div class="value-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2a10 10 0 1 0 .1 0H12zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg></div><h3>Affordable Access</h3><p>Clean water should not be a luxury. Our plans start at R299/month because we design for real household budgets.</p></div>
                  <div class="value-card"><div class="value-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 8h-3V4H3v13h2a3 3 0 0 0 6 0h3a3 3 0 0 0 6 0h1v-5l-1-4zm-3 1.5h2.2l.8 2.5h-3V9.5zM8 18.5A1.5 1.5 0 1 1 8 15a1.5 1.5 0 0 1 0 3.5zm9 0a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3z"/></svg></div><h3>Reliable Delivery</h3><p>Weekly, biweekly or monthly, we maintain your dispenser, refill your bottles and keep your water flowing.</p></div>
                </div>
              </div>
            </section>

            <section class="section about-serve">
              <div class="container">
                <span class="section-label">Our Customers</span>
                <h2 class="section-title">Who we serve</h2>
                <p class="section-desc">NeutrapH is built for the real needs of Bushbuckridge and surrounding rural communities. We serve customers who all share one need: clean, dependable drinking water.</p>
                <div class="section-divider"></div>
                <div class="serve-grid">
                  <div class="serve-card"><div class="serve-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11 12 4l9 7v9h-6v-6H9v6H3v-9z"/></svg></div><h3>Households</h3><p>Families who want safe daily drinking water without relying on unsafe tap or borehole sources.</p></div>
                  <div class="serve-card"><div class="serve-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h16v16H4V4zm3 3v3h3V7H7zm5 0v3h5V7h-5zm-5 5v5h3v-5H7zm5 0v5h5v-5h-5z"/></svg></div><h3>Schools</h3><p>Learners and staff who need consistent, safe water throughout the school day.</p></div>
                  <div class="serve-card"><div class="serve-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11 3h2v4h4v2h-4v12h-2V9H7V7h4V3z"/></svg></div><h3>Churches</h3><p>Congregations and community gatherings that need reliable water supply for events and services.</p></div>
                  <div class="serve-card"><div class="serve-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 21V7l9-4 9 4v14h-7v-5h-4v5H3zm4-9h3V9H7v3zm7 0h3V9h-3v3z"/></svg></div><h3>Offices and Businesses</h3><p>Businesses that need a professional, maintained water dispenser solution.</p></div>
                  <div class="serve-card"><div class="serve-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm4.2 5.1 1.4 4.2-3.6 2.6-3.6-2.6 1.4-4.2h4.4zM7.2 7.8l2.1-.7-1.1 3.4H4.8a7.8 7.8 0 0 1 2.4-2.7zm-.6 8.6a7.8 7.8 0 0 1-1.7-3.9h3.3l2.1 3-1.1 2.4a7.8 7.8 0 0 1-2.6-1.5zm9.1 1.5-1.1-2.4 2.1-3H20a7.8 7.8 0 0 1-4.3 5.4z"/></svg></div><h3>Football Clubs</h3><p>Teams and sports clubs that need clean hydration for training sessions and match days.</p></div>
                </div>
              </div>
            </section>

            <section class="section alt about-journey">
              <div class="container">
                <span class="section-label">Our Journey</span>
                <h2 class="section-title">How NeutrapH has grown</h2>
                <p class="section-desc">From a single purification unit to a full water service operation, here is how we got here.</p>
                <div class="section-divider"></div>
                <div class="timeline">
                  <div class="timeline-item"><div class="year">2024 - The Beginning</div><h3>NeutrapH is founded in Welverdiend</h3><p>After identifying the lack of affordable clean water in Bushbuckridge, NeutrapH is established with a focus on reverse osmosis purification for local households and community organisations.</p></div>
                  <div class="timeline-item"><div class="year">2024 - First Customers</div><h3>First schools and churches onboarded</h3><p>We began supplying water dispensers and 18.9 L bottles to local schools and churches, receiving strong feedback on reliability and water quality.</p></div>
                  <div class="timeline-item"><div class="year">2025 - Expanding Services</div><h3>Refilling station and packaged water launched</h3><p>We opened our community refilling station and launched packaged water in 500 ml, 1.5 L, 5 L and 10 L options to serve even more customer types.</p></div>
                  <div class="timeline-item"><div class="year">2025 - Subscription Plans</div><h3>Monthly subscription packages introduced</h3><p>To make clean water more predictable and affordable, we launched the Starter, Standard and Business subscription plans.</p></div>
                  <div class="timeline-item"><div class="year">2026 - Growing the Mission</div><h3>Serving more communities across Mpumalanga</h3><p>NeutrapH continues to expand its delivery areas and service offerings, with broader community partnerships ahead.</p></div>
                </div>
              </div>
            </section>

            <section class="about-cta">
              <div class="container">
                <h2>Ready to get clean water delivered?</h2>
                <p>Join the homes, schools and businesses across Bushbuckridge who trust NeutrapH for their daily drinking water.</p>
                <div class="hero-actions">
                  <a href="subscriptions.html" class="btn btn-blue">View Subscription Plans</a>
                  <a href="contact.html" class="btn btn-outline">Contact Us</a>
                </div>
              </div>
            </section>
          </main>

          <footer id="contact"><div class="container">
            <div class="footer-grid">
              <div><img src="assets/images/neutraph-logo.png" class="footer-logo-img" alt="NeutrapH Logo" onerror="this.style.display='none'"><p class="footer-about">Our mission is to deliver clean, safe drinking water to every community. Serving Bushbuckridge and surrounding communities.</p></div>
              <div class="footer-col"><h4>Quick Links</h4><div class="footer-links"><a href="index.html">Home</a><a href="water-purification.html">Water Purification</a><a href="water-dispensers.html">Water Dispensers</a><a href="subscriptions.html">Subscription Plans</a><a href="Shop.html">Packaged Water</a><a href="about.html">About Us</a><a href="contact.html">Contact</a></div></div>
              <div class="footer-col"><h4>Contact Us</h4><div class="contact-row"><div class="contact-icon"><svg aria-hidden="true" viewBox="0 0 24 24" focusable="false"><path d="M6.6 10.8c1.4 2.8 3.8 5.2 6.6 6.6l2.2-2.2c.3-.3.8-.4 1.2-.3 1.3.4 2.6.6 4 .6.7 0 1.2.5 1.2 1.2v3.5c0 .7-.5 1.2-1.2 1.2C10.8 21.9 2.1 13.2 2.1 3.4c0-.7.5-1.2 1.2-1.2h3.5c.7 0 1.2.5 1.2 1.2 0 1.4.2 2.7.6 4 .1.4 0 .9-.3 1.2l-1.7 2.2z"/></svg></div><div class="contact-row-text">+27 79 813 4597</div></div><div class="contact-row"><div class="contact-icon"><svg aria-hidden="true" viewBox="0 0 24 24" focusable="false"><path d="M3.8 5h16.4c1 0 1.8.8 1.8 1.8v10.4c0 1-.8 1.8-1.8 1.8H3.8c-1 0-1.8-.8-1.8-1.8V6.8C2 5.8 2.8 5 3.8 5zm.6 2 7.6 5.1L19.6 7H4.4zm15.6 9.6V8.9l-7.3 4.9c-.4.3-.9.3-1.4 0L4 8.9v7.7h16z"/></svg></div><div class="contact-row-text">info@neutraph.co.za</div></div><div class="contact-row"><div class="contact-icon"><svg aria-hidden="true" viewBox="0 0 24 24" focusable="false"><path d="M12 2.2c4 0 7.2 3.2 7.2 7.2 0 5.3-7.2 12.4-7.2 12.4S4.8 14.7 4.8 9.4c0-4 3.2-7.2 7.2-7.2zm0 10.3a3.1 3.1 0 1 0 0-6.2 3.1 3.1 0 0 0 0 6.2z"/></svg></div><div class="contact-row-text">Welverdiend, Bushbuckridge<br>Mpumalanga, South Africa</div></div></div>
              <div class="footer-col"><h4>Follow Us</h4><div class="social-row"><a href="https://facebook.com/neutraph" class="social-btn" aria-label="Facebook"><img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_%282019%29.png" alt="Facebook"></a><a href="https://instagram.com/neutraph" class="social-btn" aria-label="Instagram"><img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" alt="Instagram"></a><a href="https://wa.me/27798134597" target="_blank" class="social-btn" aria-label="WhatsApp"><img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp"></a></div></div>
            </div>
            <div class="footer-bottom"><span>&copy; 2026 NeutrapH. All Rights Reserved.</span><span>Designed with Purpose</span></div>
          </div></footer>

          <a class="sticky-mobile-cta" href="https://wa.me/27798134597" target="_blank">WhatsApp NeutrapH</a>
          <script src="assets/js/script.js"></script>
          </body>
          </html>
          HTML

          find . -maxdepth 1 -type f -name "*.html" -print0 | xargs -0 perl -0pi -e 's#(<a href="Shop\.html" data-page="Shop\.html">Shop</a>\s*)<a href="contact\.html" data-page="contact\.html">Contact</a>#$1<a href="about.html" data-page="about.html">About Us</a>\n      <a href="contact.html" data-page="contact.html">Contact</a>#g; s#<a href="Shop\.html">Packaged Water</a><a href="contact\.html">Contact</a>#<a href="Shop.html">Packaged Water</a><a href="about.html">About Us</a><a href="contact.html">Contact</a>#g;'

          if ! grep -q "ABOUT US PAGE" assets/css/style.css; then
            cat >> assets/css/style.css <<'CSS'

          /* =========================================================
             ABOUT US PAGE
          ========================================================= */
          .page-about main{background:#f6fbff}
          .about-hero{min-height:720px;display:flex;align-items:center;color:#fff;background:linear-gradient(90deg,rgba(3,30,83,.98) 0%,rgba(4,55,120,.90) 38%,rgba(0,119,182,.48) 66%,rgba(0,119,182,.08) 100%),url("../images/hero-home.png") center right/cover no-repeat;overflow:hidden}.about-hero .container{min-height:720px;display:flex;flex-direction:column;justify-content:center;align-items:flex-start}.about-hero h1{font-family:'Montserrat',sans-serif;font-size:clamp(48px,5.4vw,78px);line-height:1;font-weight:900;letter-spacing:-.045em;margin-bottom:22px}.about-hero p{max-width:620px;font-size:clamp(16px,1.45vw,20px);line-height:1.75;color:rgba(255,255,255,.92);margin-bottom:30px}.story-grid{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center}.about-story p{color:#52627a;margin-bottom:16px;max-width:720px}.story-visual{position:relative;overflow:hidden;border:1px solid #d7ebf8;border-radius:8px;padding:48px 32px;text-align:center;background:linear-gradient(135deg,#e8f6fd 0%,#c8eaf8 100%);box-shadow:0 16px 40px rgba(6,65,110,.10)}.story-visual::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;border-radius:50%;background:rgba(14,110,166,.08)}.big-stat{position:relative;font-family:'Montserrat',sans-serif;font-size:64px;line-height:1;font-weight:900;color:#0a3d6b}.stat-label{position:relative;color:#0077b6;font-weight:800;margin:6px 0 28px}.stat-row{position:relative;display:flex;justify-content:center;gap:32px}.mini-stat strong{display:block;font-family:'Montserrat',sans-serif;font-size:26px;color:#0a3d6b}.mini-stat span{font-size:13px;color:#52627a}.values-grid,.serve-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:22px;margin-top:34px}.value-card,.serve-card{border:1px solid #d7ebf8;border-radius:8px;padding:28px 24px;background:#fff;box-shadow:0 14px 34px rgba(6,65,110,.08)}.value-icon,.serve-icon{width:48px;height:48px;border-radius:8px;display:grid;place-items:center;margin-bottom:16px;background:linear-gradient(135deg,#00b4d8,#0077b6);box-shadow:0 10px 22px rgba(0,119,182,.20)}.value-icon svg,.serve-icon svg{width:24px;height:24px;fill:#fff}.value-card h3,.serve-card h3,.timeline-item h3{font-family:'Montserrat',sans-serif;color:#082b57;margin-bottom:8px}.value-card p,.serve-card p,.timeline-item p{color:#52627a;font-size:14px}.about-serve{background:linear-gradient(135deg,#06243d 0%,#063b77 54%,#0077b6 100%);color:#fff}.about-serve .section-title,.about-serve .section-desc{color:#fff!important}.about-serve .section-desc{opacity:.84}.about-serve .serve-grid{grid-template-columns:repeat(5,minmax(0,1fr))}.about-serve .serve-card{text-align:left;background:rgba(255,255,255,.10);border-color:rgba(255,255,255,.20);box-shadow:0 18px 36px rgba(0,22,48,.16)}.about-serve .serve-card h3{color:#fff}.about-serve .serve-card p{color:rgba(255,255,255,.75)}.about-serve .serve-icon{background:rgba(255,255,255,.14);box-shadow:none}.timeline{position:relative;margin-top:40px;padding-left:34px;max-width:860px}.timeline::before{content:'';position:absolute;left:10px;top:8px;bottom:8px;width:2px;background:linear-gradient(to bottom,#0077b6,#00b4d8)}.timeline-item{position:relative;margin-bottom:34px;padding:24px;border:1px solid #d7ebf8;border-radius:8px;background:#fff;box-shadow:0 12px 28px rgba(6,65,110,.07)}.timeline-item::before{content:'';position:absolute;left:-31px;top:30px;width:12px;height:12px;border-radius:50%;background:#0077b6;border:3px solid #fff;box-shadow:0 0 0 2px #0077b6}.year{font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;color:#0077b6;margin-bottom:4px}.about-cta{padding:70px 0;text-align:center;background:#eef8ff;border-top:3px solid #00b4d8}.about-cta .container{display:flex;flex-direction:column;align-items:center}.about-cta h2{font-family:'Montserrat',sans-serif;font-size:clamp(28px,3vw,42px);color:#082b57;margin-bottom:12px}.about-cta p{max-width:580px;color:#52627a;margin-bottom:26px}.about-cta .btn-outline{color:#0077b6!important;border-color:#0077b6!important;background:#fff!important}.about-cta .btn-outline:hover{background:#0077b6!important;color:#fff!important}@media(max-width:1050px){.story-grid{grid-template-columns:1fr;gap:32px}.values-grid,.serve-grid,.about-serve .serve-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:700px){.about-hero,.about-hero .container{min-height:660px}.about-hero .container{align-items:center;text-align:center}.about-hero h1{font-size:46px}.values-grid,.serve-grid,.about-serve .serve-grid{grid-template-columns:1fr}.stat-row{gap:18px}}
          CSS
          fi

          rm -f ".github/workflows/codex-add-about-page.yml"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes needed."
            exit 0
          fi
          git commit -m "Add About Us page"
          git push
